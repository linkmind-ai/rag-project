[pytest]
markers =
    integration: tests that require real network access (e.g., APIs, DBs)

pythonpath = .

testpaths = tests

# 👇 [수정] filterwarnings 섹션을 아래와 같이 수정합니다.
filterwarnings =
    # 1. (수정) OpenMP 경고를 메시지 내용이 아닌 모듈(threadpoolctl) 기준으로 무시합니다.
    ignore::RuntimeWarning:threadpoolctl

    # 2. (유지) Urllib3의 SSL/TLS 보안 경고를 무시합니다.
    ignore:Unverified HTTPS request:urllib3.exceptions.InsecureRequestWarning